# vesc-mcp configuration
#
# Ubuntu/macOS: copy to $HOME/.config/vesc-mcp/config.toml.
# Windows: choose a location and set VESC_MCP_CONFIG to its full path.
# Environment variables override this file.

[paths]
# Directories the MCP server may scan, build, and inspect (also VESC_PACKAGE_ROOTS).
package_roots = [
  "/path/to/vesc-packages",
]

# Upstream repo checkouts used for catalog path validation.
# Relative paths resolve against the vesc-mcp workspace root (e.g. vendor/ submodules).
# refloat_root = "/path/to/refloat"
# vesc_root = "/path/to/vesc"
# poc_root = "/path/to/vesc-rust-poc"
# vesc_tool_root = "/path/to/vesc_tool/source"

# vesc_tool binary for subprocess builds (also VESC_TOOL_PATH).
# vesc_tool = "/path/to/vesc_tool"

[features]
# Reserved default-off gate; no flash/upload tools currently ship.
enable_flash = false

[knowledge]
# Rollout modes: lexical, legacy, auto, hybrid.
mode = "lexical"
# Persistent managed-source state. Must be absolute. When omitted, systemd's
# STATE_DIRECTORY, then the platform/XDG per-user data directory is used.
# data_root = "/var/lib/vesc-mcp"
max_limit = 50
max_query_bytes = 4096
max_response_bytes = 65536
max_passage_bytes = 8192

# Managed source repositories are optional. Release startup/explicit refresh
# fetches them with gix and atomically publishes one combined history default.
# [[knowledge.repositories]]
# id = "vesc-tool"
# remote_url = "https://github.com/vedderb/vesc_tool.git"
# default_ref = "refs/heads/master"
# policy = "required" # disabled, optional, or required
# include = ["**/*.cpp", "**/*.h", "*.pro"]
# exclude = ["build/**"]
# trust_tier = "official" # official, community, or untrusted
# license = "GPL-3.0-or-later"
# attribution = "VESC Project"
# max_file_bytes = 1048576
# max_files = 100000
# max_total_bytes = 1073741824

# Official VESC packages repository.
# [[knowledge.repositories]]
# id = "vesc-pkg"
# remote_url = "https://github.com/vedderb/vesc_pkg.git"
# default_ref = "refs/heads/main"
# policy = "optional"
# include = ["**/*.lisp", "**/*.md", "**/*.qml"]
# exclude = [".git/**"]
# trust_tier = "official"
# license = "GPL-3.0-or-later"
# attribution = "VESC Project"
# max_file_bytes = 1048576
# max_files = 100000
# max_total_bytes = 1073741824

[feedback]
# Optional durable directory. The server stores a bounded feedback.json here.
# path = ".vesc-mcp-feedback"
# Write tools stay hidden unless this is explicitly enabled.
writes_enabled = false

[knowledge.semantic]
# Optional: explicitly provisioned local FastEmbed model metadata.
# model_dir = "/path/to/your-pinned-model"
# model_id = "your-model-id"
# model_revision = "your-model-revision"
# max_length = 512
