# vesc-mcp configuration
#
# Ubuntu/macOS: copy to ~/.config/vesc-mcp/config.toml.
# Windows: choose a location and set VESC_MCP_CONFIG to its full path.
# Environment variables override this file.

[paths]
# Directories the MCP server may scan, build, and inspect (also VESC_PACKAGE_ROOTS).
package_roots = [
  "/path/to/vesc-packages",
]

# Upstream repo checkouts used for catalog path validation.
# Relative paths resolve against the vesc-mcp workspace root (e.g. vendor/ submodules).
# refloat_root = "/path/to/refloat"
# bldc_root = "/path/to/bldc"
# poc_root = "/path/to/vesc-rust-poc"
# vesc_tool_root = "/path/to/vesc_tool/source"

# vesc_tool binary for subprocess builds (also VESC_TOOL_PATH).
# vesc_tool = "/path/to/vesc_tool"

[features]
# Reserved default-off gate; no flash/upload tools currently ship.
enable_flash = false

[knowledge]
# Rollout modes: lexical, legacy, auto, hybrid.
mode = "lexical"
max_limit = 50
max_query_bytes = 4096
max_response_bytes = 65536
max_passage_bytes = 8192

[knowledge.semantic]
# Optional: explicitly provisioned local FastEmbed model metadata.
# model_dir = "~/.cache/vesc-mcp/models/your-pinned-model"
# model_id = "your-model-id"
# model_revision = "your-model-revision"
