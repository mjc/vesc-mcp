name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.task }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        task: [lint, feature-boundaries, test]
    env:
      CARGO_BUILD_JOBS: 2
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-workspace-crates: true
          cmd-format: nix develop .#ci -c {0}
          env-vars: CARGO_BUILD_JOBS CARGO_INCREMENTAL CARGO_PROFILE_DEV_DEBUG CARGO_PROFILE_TEST_DEBUG
          shared-key: ${{ matrix.task }}

      - name: Check flake
        if: matrix.task == 'lint'
        run: nix flake check --print-build-logs

      - name: Run ${{ matrix.task }} checks
        run: nix develop .#ci -c make ${{ matrix.task }}
