name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Run checks
        run: nix develop -c make check

      - name: Verify fixture suite
        run: nix develop -c cargo nextest run -p vesc-mcp-core -E 'test(fixtures_)'
