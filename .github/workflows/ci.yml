name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Sync and initialize submodules
        run: git submodule sync --recursive && git submodule update --init --recursive

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: Swatinem/rust-cache@v2
        with:
          cmd-format: nix develop -c {0}

      - name: Run checks
        run: nix develop -c make check

  docs-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Sync and initialize submodules
        run: git submodule sync --recursive && git submodule update --init --recursive

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: Swatinem/rust-cache@v2
        with:
          cmd-format: nix develop -c {0}

      - name: Docs MCP smoke
        run: nix develop -c ./scripts/docs-smoke.sh

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Sync and initialize submodules
        run: git submodule sync --recursive && git submodule update --init --recursive

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: Swatinem/rust-cache@v2
        with:
          cmd-format: nix develop -c {0}

      - name: Run coverage
        run: |
          IGNORE=$(grep -v '^#' .config/coverage-exclude.regex | head -1)
          nix develop -c cargo llvm-cov nextest run \
            --workspace --profile ci \
            --features vesc-mcp-core/test-fixtures \
            --ignore-filename-regex "$IGNORE" \
            --lcov --output-path lcov.info

      - name: Per-crate summary
        run: nix develop -c bash scripts/coverage-summary.sh || true

      - uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info
