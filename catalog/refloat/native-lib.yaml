# Refloat vendored vesc_pkg_lib native library build layout
# Source: refloat/vesc_pkg_lib/, refloat/src/Makefile
id: refloat-native-lib
source_repo: refloat
source_repo_env: VESC_REFLOAT_ROOT
version: 1

vendored_tree:
  path: vesc_pkg_lib/vesc_c_if.h
  header: vesc_pkg_lib/vesc_c_if.h
  upstream: vesc/lispBM/c_libs/vesc_c_if.h
  build_rules: vesc_pkg_lib/rules.mk
  linker_script: vesc_pkg_lib/link.ld
  converter: vesc_pkg_lib/conv.py

src_makefile:
  path: src/Makefile
  target: package_lib
  lines: [1, 53]
  vesc_c_lib_path: ../vesc_pkg_lib/
  toolchain: arm-none-eabi-gcc (Cortex-M4, hard float)
  outputs:
    - src/package_lib.bin
    - src/package_lib.elf
    - src/package_lib.list
    - src/package_lib.lisp

rules_mk:
  path: vesc_pkg_lib/rules.mk
  lines: [1, 70]
  compile_flags:
    - "-fpic -Os -DIS_VESC_LIB"
    - "-mcpu=cortex-m4 -mfloat-abi=hard -mfpu=fpv4-sp-d16"
  link_flags:
    - "-nostartfiles -static -T link.ld"
    - "--undefined=init"
  pipeline:
    - "*.c -> *.so (object)"
    - "link -> package_lib.elf"
    - "objcopy -> package_lib.bin"
    - "conv.py -> package_lib.lisp"

examples:
  - vesc_pkg_lib/examples/extension/
  - vesc_pkg_lib/examples/config/
  - vesc_pkg_lib/examples/thread/
  - vesc_pkg_lib/examples/custom_data_comm/

config_generation:
  path: src/Makefile
  lines: [29, 32]
  command: '$(VESC_TOOL) --xmlConfToCode conf/settings.xml'
  note: LTO workaround patches conf/confxml.c for vesc_tool XML config loading

related_vesc:
  - lispBM/c_libs/vesc_c_if.h
